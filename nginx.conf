server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # topics HTML files — no cache for dev convenience
    location /topics/ {
        add_header Cache-Control "no-cache";
    }

    # directory.json — no cache
    location = /directory.json {
        add_header Cache-Control "no-cache";
    }
}
